<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Map Example</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            text-align: center;
            margin: 15px 0;
        }

        #map {
            height: 90%;
            width: 100%;
        }
    </style>
</head>
<body>

<h2>My Google Map</h2>

<div id="map"></div>

<script>
function initMap() {
    // Example: San Francisco
    const location = {
        lat: 37.7749,
        lng: -122.4194
    };

    const map = new google.maps.Map(document.getElementById("map"), {
        zoom: 12,
        center: location,
        mapTypeId: "roadmap"
    });

    new google.maps.Marker({
        position: location,
        map: map,
        title: "San Francisco"
    });
}
</script>

<!-- Replace YOUR_API_KEY with your Google Maps JavaScript API key -->
<script async defer
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
</script>

</body>
</html>

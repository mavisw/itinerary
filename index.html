<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taichung Map</title>

    <!-- Leaflet CSS -->
    <link 
        rel="stylesheet" 
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            text-align: center;
            margin: 10px;
        }

        #map {
            height: calc(100% - 50px);
            width: 100%;
        }
    </style>
</head>

<body>

<h2>Taichung, Taiwan</h2>

<div id="map"></div>

<!-- Leaflet JavaScript -->
<script 
    src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script>
    // Taichung coordinates
    const taichung = [24.1477, 120.6736];

    // Create map
    const map = L.map('map').setView(taichung, 13);

    // OpenStreetMap tiles
    L.tileLayer(
        'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }
    ).addTo(map);

    // Add marker
    L.marker(taichung)
        .addTo(map)
        .bindPopup("<b>Taichung, Taiwan</b>")
        .openPopup();
</script>

</body>
</html>

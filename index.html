<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taichung, Taiwan Map</title>

    <!-- Leaflet map library -->
    <link 
        rel="stylesheet" 
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h1 {
            height: 50px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        #map {
            height: calc(100% - 50px);
            width: 100%;
        }
    </style>
</head>

<body>

<h1>Taichung, Taiwan</h1>

<div id="map"></div>

<!-- Leaflet JavaScript -->
<script 
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script>
    // Taichung City coordinates
    const taichung = [24.1477, 120.6736];

    // Create map
    const map = L.map("map").setView(taichung, 13);

    // OpenStreetMap layer
    L.tileLayer(
        "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
            maxZoom: 19,
            attribution: "© OpenStreetMap contributors"
        }
    ).addTo(map);

    // Add marker
    L.marker(taichung)
        .addTo(map)
        .bindPopup(
            "<b>Taichung, Taiwan</b><br>Central Taichung"
        )
        .openPopup();
</script>

</body>
</html>

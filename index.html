<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Map - Taichung, Taiwan</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        h2 {
            margin: 10px;
            text-align: center;
        }

        #map {
            flex: 1;
            width: 100%;
        }
    </style>
</head>
<body>

<h2>Taichung, Taiwan</h2>

<div id="map"></div>

<script>
function initMap() {
    const taichung = {
        lat: 24.1477,
        lng: 120.6736
    };

    const map = new google.maps.Map(document.getElementById("map"), {
        center: taichung,
        zoom: 13,
        mapTypeId: "roadmap"
    });

    new google.maps.Marker({
        position: taichung,
        map: map,
        title: "Taichung, Taiwan"
    });
}
</script>

<!-- Replace YOUR_API_KEY with your Google Maps JavaScript API key -->
<script
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"
    async
    loading="async">
</script>

</body>
</html>
